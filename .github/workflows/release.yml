name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  JAVA_VERSION: "21"

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog generation

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      # ── Firebase Config (from Secrets) ──
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      # ── Signing (from Secrets) ──
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      # ── Update Version ──
      - name: Update pubspec version from tag
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"  # Strip leading 'v'

          # Extract major.minor.patch and compute versionCode
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          sed -i "s/^version: .*/version: ${VERSION}+${VERSION_CODE}/" pubspec.yaml
          echo "Building version: ${VERSION}+${VERSION_CODE}"

      # ── Build ──
      - name: Install dependencies
        run: flutter pub get

      - name: Generate Isar schemas
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: flutter build apk --release

      # ── Changelog ──
      - name: Generate Changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            # First release — all commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "Generating changelog for range: ${RANGE}"

          # Categorize commits using conventional commit prefixes
          FEATURES=$(git log $RANGE --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
          CHORES=$(git log $RANGE --pretty=format:"- %s" --grep="^chore" 2>/dev/null || true)
          DOCS=$(git log $RANGE --pretty=format:"- %s" --grep="^docs" 2>/dev/null || true)

          # All other commits
          ALL_COMMITS=$(git log $RANGE --pretty=format:"- %s" 2>/dev/null || true)

          # Build changelog body
          BODY="## What's Changed in ${TAG}\n\n"

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### ✨ Features\n${FEATURES}\n\n"
          fi

          if [ -n "$FIXES" ]; then
            BODY="${BODY}### 🐛 Bug Fixes\n${FIXES}\n\n"
          fi

          if [ -z "$FEATURES" ] && [ -z "$FIXES" ]; then
            BODY="${BODY}### 📋 Changes\n${ALL_COMMITS}\n\n"
          fi

          BODY="${BODY}---\n\n"
          BODY="${BODY}### 📦 Assets\n"
          BODY="${BODY}- \`silo-vault-${TAG}.apk\` — Android release build\n\n"
          BODY="${BODY}### 🔐 Verification\n"
          BODY="${BODY}- All data encrypted with AES-256-CBC\n"
          BODY="${BODY}- Cloud sync is end-to-end encrypted\n"
          BODY="${BODY}- Zero telemetry, zero tracking\n"

          # Write to file (handles multiline)
          echo -e "$BODY" > changelog.md
          cat changelog.md

      # ── Release ──
      - name: Rename APK
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cp build/app/outputs/flutter-apk/app-release.apk "silo-vault-${TAG}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Silo Vault ${{ steps.version.outputs.tag }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'alpha') }}
          files: |
            silo-vault-${{ steps.version.outputs.tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
