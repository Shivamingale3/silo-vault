name: "notes_vault"
description: "A secure place to write whatever's in your mind and you'll forget later."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  device_info_plus: ^12.3.0
  envied: ^1.3.3
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
