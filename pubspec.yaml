name: "notes_vault"
description: "A secure place to write whatever's in your mind that you'll forget later."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  app_settings: ^7.0.0
  bcrypt: ^1.2.0
  device_info_plus: ^12.3.0

  encrypt: ^5.0.3
  envied: ^1.3.3
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0
  local_auth: ^3.0.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1

  isar_community_generator: ^3.3.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
